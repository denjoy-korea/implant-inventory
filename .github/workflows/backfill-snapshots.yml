name: Backfill Traffic Snapshots

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '백필 시작일 (YYYY-MM-DD, KST)'
        required: true
        default: '2026-02-25'
      end_date:
        description: '백필 종료일 (YYYY-MM-DD, KST, 기본 어제)'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backfill
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          if [ -z "$END" ]; then
            END=$(date -u -d '1 day ago' '+%Y-%m-%d' 2>/dev/null || date -u -v-1d '+%Y-%m-%d')
          fi

          echo "백필 구간: $START ~ $END"

          current="$START"
          while [[ "$current" < "$END" || "$current" == "$END" ]]; do
            echo "→ $current 스냅샷 생성 중..."
            node scripts/admin-traffic-snapshot.mjs 30 --daily --snapshot-date="$current" || echo "  [warn] $current 실패 (계속)"
            current=$(date -u -d "$current + 1 day" '+%Y-%m-%d' 2>/dev/null || date -u -v+1d -j -f '%Y-%m-%d' "$current" '+%Y-%m-%d')
          done

      - name: Check coverage after backfill
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/traffic-snapshot-coverage.mjs 28 7
        # 백필 직후에는 7일 이상이면 통과 (점진적 기준)

      - name: Commit backfilled snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/04-report/traffic-kpi-daily/
          git add docs/04-report/traffic-kpi-coverage.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            COUNT=$(git diff --cached --name-only | grep -c "traffic-kpi-snapshot" || true)
            git commit -m "chore: backfill traffic snapshots (${COUNT}일치)"
            git push
          fi
